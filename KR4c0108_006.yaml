front:
  text: 甲乙集卷第六
  hash: sha256:69bb7d4b606ca53941af2ace0364bb605266c2202950f65d5e0ad27d2b595e38
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_006-1a}
body:
  text: 餘杭羅隱昭諫詩送支使蕭中丞赴闕八年刀筆别京華歸去青冥路未賖今日風流卿相客舊時基業帝王家彤庭綵鳯雖添瑞望府紅蓮巳減花從此常僚如有問海邊麋鹿斗邊槎送人歸湘中兼寄舊知青溪煙雨九華山亂後應同夢寐間萬里分飛休掩袂兩旬相見且開顔君依宰府貂蟬貴我戀王門鬢髮斑爲謝伏波筵上客幾時金印擬西還自貽衰老應難更進趨藥畦經卷自朝晡縱無顯效亦藏拙若有所成甘守株漢武巡游虚軋軋秦皇吞併謾驅驅如何只見丁家鶴依舊遼東歎緑蕪暇日感懷因寄同院呉蛻拾遺璧池清秩訪燕臺曽捧瀛洲札翰來今日二難俱大夜當時三幅謾髙才戲悲槐市便便笥狂憶樟亭滿滿杯猶幸小蘭同舎在毎因相見即銜哀偶興逐隊隨行二十春曲江池畔避車塵如今夢得將衰老閑看人間得意人題鑿石山僧院日夜潮聲送是非一迴登眺一忘機憐師好事無人見不把蘭芽染褐衣圉城偶作東望陳留日欲曛毎因刀筆想夫君自從郭泰碑銘後只見黃金不見文烏程兩府攀陪十五年郡中甘雨幕中蓮一缾猶是烏程酒須對霜風度泫然送楊鍊師却歸眞浩巖宦途不復更經營歸去東南任意行别後幾回思㑹面到來相見似前生乆居竹蓋知勤苦舊業蓮峯想變更爲謝佯狂呉道士耳中時有鐵船聲暇日投錢尙父牛斗星邊女宿間棟梁虚敞麗江關望髙漢相東西閤名重淮王大小山醴設闘傾金鑿落馬歸爭撼玉連環自慚麋鹿無能事未報深恩鬢巳斑覽齊史張翰思呉中鱸膾蓴􅭑齊王僚属好男兒偶覔東歸便得歸滿目路歧抛似夢一船風雨去如飛盤擎紫線蓴初熟筯撥紅絲膾正肥惆悵中途無限事與君千載兩亡機感别元帥尚父玉函瑶檢下台司記得當時捧領時半壁龍蛇蟠造化滿筐山岳動神祗疲牛䑛犢心猶切隂鶴鳴鶵力巳衰稚子不才身抱疾日窺眞跡淚雙垂尚父偶建小樓特摛麗藻絶句不敢稱揚三首結搆叨馮柱石材敢期􅓚蓋此徘徊陽春曲調髙難和盡日焚香倚隗臺玳簮珠履愧非才時凭欄干首重迴只待淮妖剪除後别傾巵酒賀行臺欄檻初成愧楚才不知星彩尚迃迴風流孔今陶鈞外猶記山妖逼小臺題玄同先生草堂三首杳杳諸天路蒼蒼大滌山景輿留不得毛節去應閑相府舊知已教門新啓關太平匡濟術流落在人間先生訣行日曽奉數行書意宻㝷難㑹情深恨有餘石橋春暖後勾漏藥成初珍重雲兼鶴從來不定居常時憶討論歷歷事猶存酒向餘杭盡雲從大滌昏往來無道侶歸去有台恩自此玄言絶長應閉洞門城西作從軍無一事終日掩空齋道薄交游少才踈進取乖野禽鳴聒耳庭草緑侵階幸自同樗櫟何妨愜所懷冬暮城西晚眺謬忝蓮華幕虚沾栢署官欹危長抱疾衰老不禁寒時事巳日過丗途行轉難千崖兼萬壑只向望中看秋霽後淨碧山光冷圎明露點匀渚蓮丹臉恨堤柳翠眉顰蟬巳送行客鴈應辭主人蠅蚊漸無況日晩自相親茅齋從事不從事養生非養生職爲尸禄本官是受恩名時態巳相失歳華徒自驚西齋一巵酒衰老與誰傾使者使者銜中㫖﨑嶇萬里行人心猶未革天意似難明四海霍光第六龍張奉營陪臣無以報西望不勝情途中逢劉知逺吳煙波裏巢由季孟間只言無事貴不道致身閑别渚蓮根斷歸心桂樹頑空勞鍾璞意塵丗隔函關遁跡遁跡知安住沾襟欲柰何朝廷猶禮樂郡邑忍干戈華馬慿誰問胡塵自此多因思漢明帝中夜憶廉頗隴頭水借問隴頭水年年恨何事全疑嗚咽聲中有征人淚自古無長䇿況我非深智何計謝潺湲一宵空不寐秦中冨人髙髙起華堂區區引流水糞土金玉珍猶嫌未奢侈陋巷滿蓬蒿誰知有顔子思歸行不耕南畒田爲愛東堂桂身同樹上花一落又經歳交親益相薄知已恩潜替日開十二門自是無歸計即事中元甲子三秦流血巳成川塞上黃雲戰馬閑只有羸兵塡渭水終無竒士出商山田園已没紅塵内弟姪相逢白刃間惆悵翠華猶未返淚痕空滴劒文斑魏城逢故人一年兩度錦江游前值東風後值秋芳草有情皆礙馬好雲無處不遮樓山將别恨和心斷水帶離聲入夢流今日因君試迴首淡煙喬木隔緜州游江夏口醉别江東酒一盃往年曽此駐塵埃魚聽建業歌聲過水看瞿塘雪影來黃祖不能容賤客費禕終是負仙才平生膽氣平生恨今日江邊首懶迴春思蕩漾春風渌似波惹情摇恨去傞傞燕翻永日音聲好柳舞空城意緒多蜀國暖迴溪峽浪衞娘清轉遏雲歌可憐户外桃兼李仲蔚蓬蒿柰你何黃鶴驛寓題野雲芳草遶離鞭敢對青樓倚少年秋色來催榆塞鴈人心先下洞庭船髙歌酒市非狂者大嚼屠門亦偶然車馬同歸莫同恨古人頭白盡林泉安陸贈徐礪靈蛇橋下水聲聲曽向橋邊話别情一榻偶依陳太守二年深憶禰先生塵欺鬢色非前事火爇蓬根有去程還把餘杯童相勸不堪秋色背鄖城寄鍾常侍一從朱履歩金臺蘖苦冰寒奉􅎅台峻節不由人學得逺途終是自將來風髙漸展摩天翼幹聳方呈構厦材應笑樟髙舊同舎九州無驗滿爐灰中秋夜不見月隂雲薄暮上空虚此夕清光共破除只恐異時開霽後玉輪依舊養蟾蜍魏慱羅令公附卷有迴寒門雖得在諸宗棲北巢南恨不同馬上固慚銷髀肉幄中由羡愈頭風蹉蛇歳月心仍切迢遞江山夢未通深荷吾有知已好將刀筆爲英雄寄處黙師甘露卷簾看雨脚樟亭倚柱望潮頭十年顧我醉中過兩地與師方外游乆隔兵戈長寄夢近無書信更堪憂香爐煙靄虎溪月終棹鐵船㝷惠休病中上錢尚父左脚方行右臂攣毎慚名跡汚賔筵緃饒呉主容衰病爭柰燕臺費料錢藜杖巳乾難更把竹轝雖在不堪懸深恩重德無言處迴首浮生淚泫然甲乙集卷第六
