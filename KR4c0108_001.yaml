front:
  text: 甲乙集卷第一
  hash: sha256:b13950656af0c766f41f81d8169923e219a77da0bf90238f6369dfd956e110b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_001-1a}
body:
  text: 餘杭羅隱昭諫詩曲江春感江頭日暖花又開江東行客心悠哉髙陽酒徒半彫落終南山色空崔嵬聖代也知無棄物侯門未必用非才滿船明月一竿竹家往五湖歸去來皇陂皇陂㶑灧深復深陂西下馬聊登臨垂楊風輕弄翠帶鯉魚日暖跳黃金三月窮途無勝事十年流水見歸心輸他谷口鄭夫子偷得閑名直至今寄鄭𥙷闕夫子門前數仞墻毎經過處憶遊梁路從青瑣無因見恩在丹心不可忘未必便爲讒口隔只應貪草諫書忙别來愁悴知多少兩度槐花馬上黃牡丹花似共東風别有因絳羅髙卷不勝春若教解語應傾國任是無情亦動人芍樂與君爲近侍芙蓉何處避芳塵可憐韓令功成後辜負穠華過此身黃河莫把阿膠向此傾此中天意固難明解通銀漢應須曲纔出崑崙便不清髙祖誓功衣帶小仙人占斗客槎輕三千年後知誰在何必勞君報太平汴河當時天子是閑遊今日行人特地愁柳色縱饒粧故國水聲何忍到揚州乾坤有意終難㑹黎庶無情豈自由應笑秦皇用心錯謾驅神鬼海東頭西京崇德里居進乏梯媒退又難強隨豪貴殢長安風從昨夜吹銀漢淚擬何門落玉盤抛擲紅塵應有恨思量仙桂也無端錦鱗頳尾平生事却𬒳閑人把釣竿投所思顦顇長安何所爲旅魂窮命自相疑滿川碧嶂無歸日一塌紅塵有淚時雕琢只應勞郢匠膏肓終恐悟秦醫浮生七十今三十從此恓惶未可知經張舎人舊居行塵不是昔時塵謾向朱門憶侍臣一塌巳無開眼處九泉應有愛才人文餘吐鳯他年詔樹想栖鸞舊日春從此恩深轉難報夕陽衰草淚沾巾維城作大鹵旌旗出洛濵此中煙月巳埃塵更無樓閣㝷行處只有山川識野人早得鑄金誇范蠡旋聞垂釣哭平津舊遊難得時難遇迴首空城百草春姑蘇城南湖陪曹使君遊水蓼花紅稻穗黃使君蘭棹泛迴塘倚風藻荇先開路迎斾鳬鷖盡着行手裏兵符神與術腰間金印綵爲囊少年太守勲庸盛應笑燕臺兩鬢霜秋日有寄姑蘇曹使君多病無因棹小舟闔閭城下謁名侯水寒不見雙魚信風便唯聞五袴謳早說用兵長暗合近傳觀稼亦閑遊須知謝奕依前醉間阻清談又一秋送章碣赴舉苹鹿歌終别酒催粉闈星綵動昭回乆經罹亂心應破乍覩昇平眼漸開顧我昔年悲玉石憐君今日藴風雷龍門盛事無因見費盡黃金老隗臺寄楊祕書潮水平來見鯉魚偶因烹處得瓊琚披㝷藻思千重後吟想冰光萬里餘漳浦病來情轉薄赤城吟苦意何如錦衣公子憐君在十載兵戈從板輿往年進士趙能卿嘗話金庭勝事見示叙㑹稽詩客趙能卿往歳相逢話石城正恨故人無上壽喜聞良宰有髙情山朝佐命層層聳水接飛流歩歩清兩火一刀罹亂後㑹須乗興雪中行得宣州竇尚書書因投寄二首雙魚迢遞到江濵傷感南陵舊主人萬里朝臺勞寄夢十年侯國阻趨塵㝷知亂後嘗辭禄共喜閑來得養神時見齊山敬亭客不堪戎馬戰征頻曽逐旌旗過板橋丗途多難竟蓬飄歩兵校尉辭公府車騎將軍憶本朝醉裏舊遊還歷歷病中衰鬢柰蕭蕭遺簮墜履應留念門客如今只下僚雪細玉羅紋下碧霄杜門傾巷落偏饒巢居只恐髙柯折旅客愁聞去路遥撅凍野𬞞和粉重掃庭松葉帶酥燒寒䆫呵筆㝷詩句一片飛來紙上銷暇日有寄姑蘇曹使君兼呈張郎中郡中賔僚嘉植隂隂覆劒池此中能政動神祗湖邊觀稼雨迎馬城外犒軍風滿旗融酒徒誇無筭爵儉蓮還少最髙枝珊瑚筆架眞珠履曽和陳王幾首詩寄右省王諌議耳邊要靜不得靜心裏欲閑終未閑自是宿縁應有累可能時事更相關魚慙張翰辭東府鶴怨周顒負北山看却金庭芝术老又驅車入七人班焚書坑千載遺蹤一窖塵路傍耕者亦傷神祖龍筭事渾乖角將爲詩書活得人始皇陵荒堆無草樹無枝懶向行人問昔時六國英雄謾多事到頭徐福是男兒送沈先輩歸宋上嘉禮青青仙桂觸人香白苧衫輕稱沈郎好繼馬卿歸故里況聞山簡在襄陽盃傾别岸應須醉花傍征車漸欲芳擬把金錢贈嘉禮不堪栖屑困名埸春日葉秀才曲江江花江草暖相隈也向江邊把酒盃春色惱人遮不得别愁如瘧避還來安排賤跡無良䇿禆補明時望重才一曲呉歌齊拍手十年塵眼未曽開西京道德里秦樹團團夕結隂此中莊舄動悲吟一枝丹桂未入手萬里滄波長負心老去漸知時態薄愁來惟願酒盃深七雄三傑今何在休爲閑人淚滿襟憶夏口漢陽渡口蘭爲舟漢陽城下多酒樓當年不得盡一醉别夢有時還重遊襟帶可憐吞塞鴈風煙好是冷江鷗月明更想曽行處吹笛橋邊木葉秋武牢關楚人曽此限封疆不見清隂六里長一壑暮聲何怨望數峯秋勢自顚狂由來四皓須神伏大底秦皇謾氣強欲學鷄鳴試關吏太平時節懶思量途中獻晉州孟中丞太平天子念蒲東又委星郎養育功昨日隼旟辭闕下今朝珠履在河中樓移庾亮千山月樹待袁宏一扇風不及政成應入拜晉州何足展清通秋晚寄友人洞庭霜落水雲秋又泛輕漣任去留丗界髙談今巳得宦途清貴舊曽遊手中綵筆誇題鳯天上泥封奨狎鷗更見南來釣翁說醉吟還上木蘭舟秋日有酬舊業傳家有佩刀近聞揮力更揮毫腰間印綬黃樞貴卷裏文章白雪髙宴罷佳賔吟鳯藻獵歸諸將問龍韜登壇甲子纔三十猶擬迴頭賭錦𫀆所思梁王兎苑荆榛裏煬帝鷄臺夢想中只覺惘然悲謝傳未知何以報文翁生靈不幸台星拆造化無情丗界空劃盡寒灰始堪歎滿庭霜葉一牎風送魏校書兼呈曹使君亂罹無計駐生涯又事東遊惜歳華村店酒旗沽竹葉野橋梅雨泊蘆花讎書發跡官雖屈負米安親路不賖應見使君論丗舊掃門重得向曹家四皓廟漢惠秦皇事巳聞廟前髙木眼前雲楚王謾費閑心力六里青山盡屬君浮雲溶溶曵曵自舒張不向蒼梧即帝郷莫道無心便無事也曽愁殺楚襄王早發北去南來無定居此生生計竟何如酷憐一覺平明睡長𬒳雞聲惡破除香沉水良材食栢珍愽山爐暖玉樓春憐君亦是無端物貪作馨香忘却身鄴城臺上年年掩翠蛾臺前髙樹夾漳河英雄亦到分香處能共常人校幾多甲乙集卷第一
