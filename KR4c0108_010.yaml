front:
  text: 甲乙集卷第十
  hash: sha256:625f7cded7464088c70cba468c3be8375e6ac5982e04193909e26d0aa08691f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_010-1a}
body:
  text: 餘杭羅隱昭諫詩虚白堂前牡丹相傳云太傅手植在錢唐欲詢往事柰無言六十年來此托根香暖幾飄袁虎扇格髙長對孔融罇曽憂丗亂隂難合且喜春殘色尚存莫背欄干便相笑與君俱受主人恩縣齋秋晚酬友人朱瓉見寄中和節後捧瓊瓌坐讀行吟數月來只嘆雕龍方擅價不知頳尾竟空迴千枝白露陶潜柳百尺黃金郭隗臺惆悵報君無玉案水天東望一徘徊第五將軍於餘杭天柱宫入道因寄交梨火棗味何如聞說苕川巳下車瓦榼尚攜京口酒草堂應寫潁陽書亦知得意猶乗鶴未必忘機便釣魚却恐武皇還望祀軟輪徴入問玄虚寄無相禪師老住西峯第幾層爲師迴首憶南能有縁有想應非佛無我無人始是僧爛椹作袍名復利鑠金爲講愛兼憎何如一衲塵埃外日日香煙夜夜燈秋日有寄丹青未合便迴頭見盡人間事始休只有百神朝寶鏡永無纎浪犯虚舟曽臨䥫瓮雖分職近得金陵亦偶游東去西來人不㑹上卿蹤跡本玄洲送前南昌崔令替任映攝新城縣五年苛政甚蟲螟深喜夫君已戴星大族不唯專禮樂上才終是惜生靈亦知單父琴猶在莫厭東歸酒未醒二月春風何處好亞夫營畔柳青青下第作年年模様一般般何似東歸把釣竿喦谷謾勞思雨露彩雲終是逐鵷鸞塵迷魏闕身應老水到呉門葉欲殘至竟窮多也須逹不能長與世人看丁亥歳作中元甲子病想醫門渇望梅十年心地槿成灰早知丗事長如此自是孤寒不合來谷畔氣濃髙蔽日蟄邊聲暖乍聞雷滿城桃李君看取一一還從舊處開北邙山一種山前路入秦嵩山堪愛此傷神魏明未死虚留意莊叟雖生酌滿巾何必更尋無主骨也知曽有弄權人羡他緱嶺吹簫客閑傍雲頭看俗塵三衢哭孫貟外燕戀雕梁馬戀軒此心從此更何言直將塵外三生命未敵君侯一日恩紅蠟有時還入夢片帆何處獨銷魂忍看明發衣襟上珠淚痕中見酒痕送蘄州裴貟外六枝仙桂最先春蕭灑髙辭九陌塵兩晉家聲須有主大朝文雅别無人榮驅豹尾抛同輩貴上螭頭見近臣蘄水蒼生莫看歸去掌絲綸重九日廣陵道中秋山抱病何處登前時韋曲今廣陵廣陵大醉不解悶韋曲舊遊堪拊膺佳節縱饒隨分過流年無柰得人憎却驅羸馬向前去牢落路歧非所能東歸别所知芙蓉宫闕二妃壇兩處因依五歳寒鄒律有風吹不變郄枝無分住應難愁心似火還燒鬢别淚非珠謾落盤却羡淮南好雞犬也能終始逐劉安旅舎書懷寄所知二首思量前事不堪㝷牢落餘情滿素琴四海豈無騰躍路一家長有别離心道從汩没甘雌㐲跡恐因循更陸沉寂寞誰應吊空館異郷時節獨沾澿簟卷兩床琴瑟秋暫慿前計柰相尤塵飄馬尾甘蓬轉酒憶江邊有夢游隋帝舊祠雖寂寞楚妃清唱亦風流可憐别恨無人易獨背殘陽下寺樓西京道中半夜秋聲觸斷蓬百年身事筭成空禰生詞賦抛江夏漢祖精神憶沛中未必他時能富貴只應從此見窮通邊禽隴水休相笑自有滄洲一棹風粉毎持纎白助君時霜自無憀雪自疑郎若姓何應解傅女論窺宋不勞施粧成麗色唯花妬落盡啼痕只鏡知最好玉京仙署裏更和秋月照瓊枝贈漁翁葉艇悠揚鶴髮垂生涯空托一輪絲是非不向眼前起寒暑任從波上移風瀁長歌籠月裏夢和春雨晝眠時逍遥此意誰人㑹應有青山渌水知下第寄張坤謾費精神棹五侯破琴孤劒是身讎九衢雙闕擬何去玉壘銅梁空舊游蝴蝶有情牽晚夢杜䳌無賴伴春愁思量不及張公子經歳池江倚酒樓東歸别常修六載辛勤九陌中却尋歸路五湖東名慙桂苑一枝緑鱠憶松江兩筯紅浮丗到頭須適性男兒何必盡成功唯慙鮑叔深知我他日蒲帆百尺風言珪玷猶來尚可磨似篁終日復如何成名成事皆因愼亡國亡家只爲多須信禍胎生利口莫將譏思逞懸河猩猩鸚鵡無端解長向人間被網羅簡今生日祥煙靄靄拂樓臺慶績玄元節後來已向青陽摽四序便從嵩嶽應三台龜銜玉柄増年筭鶴舞瓊筵獻夀盃自顧下儒何以祝柱天功業濟時才晚眺凭古城邊眺晚晴逺村髙樹轉分明天如鏡面都來淨地似人心揔不平雲向嶺頭閑不徹水流溪裏太忙生誰人得及莊居老免被榮枯寵辱驚野花萬點紅芳血色殷爲無名字對空山多因戲蝶㝷香住少有行人輟棹攀若在侯門看不足爲生江岸見如閑結根必竟輸桃李長向春城紫陌間病騘馬櫪上病騘蹄褭褭江邊廢宅路迢迢自經梅雨長垂耳乍食菰漿欲折腰金絡銜頭光未滅玉花毛色瘦來焦曽聽禁漏驚街鼓慣踏康塵怕小橋夜半雄聲心尚壯日中髙卧尾還摇龍媒落地天池逺何事牽牛在碧霄狄浦晴川倚落暉極目思依依野色寒來淺人家亂後稀乆貧身不逹多病意長違還有漁舟在時時夢裏歸南康道中弱冠負文翰此中聽鹿鳴使君延上塌時輩仰前程丹桂竟多故白雲空有情唯餘路旁淚沾灑向塵纓北固亭東望寄黙師髙亭暮色中往事更誰同水謾矜天闊山應到此窮病憐京口酒老怯海門風唯有言堪解何由見逺公華清宫樓殿層層佳氣多開元時節好笙歌也知道德勝堯舜爭奈楊妃解笑何韓信廟剪項移秦勢自雄布衣還是貟深功寡妻稚女俱堪恨休把餘盃奠蒯通韋公子擊筯狂歌惨别顔百年人事夢魂間李將軍自嘉聲在不得封侯亦是閑望思臺芳草臺邊魂不歸野煙喬木弄殘暉可憐高祖清平業留與閑人作是非帝幸蜀乹符歳馬嵬山色翠依依又見鑾轝幸蜀歸泉下阿蠻應有語這迴休更怨楊妃王夷甫把得閑書坐水濵讀來前事亦酸辛莫言麈尾清譚柄壞却淳風是此人鷺鷥斜陽澹澹柳隂隂風褭寒絲映水深不要向人誇索白也知常有羡魚心書淮隂侯傳寒燈挑盡見遺塵試瀝椒漿合有神莫恨髙皇不終始滅秦謀項是何人青山廟市蕭聲咽跡﨑嶇雪耻酬恩此丈夫霸王兩亡時亦異不知魂魄更歸無小松巳有清隂逼座隅愛聲仙客肯過無陵遷谷變須髙節莫向人間作大夫竹籬外清隂接藥欄晚風交戞碧琅玕子猷殁後知音少粉節霜匀謾歳寒謾天嶺西去休言蜀道難此中危峻巳多端到頭未㑹蒼蒼色爭得禁他兩度漫甲乙集卷第十
