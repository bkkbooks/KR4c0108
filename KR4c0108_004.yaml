front:
  text: 甲乙集卷第四
  hash: sha256:4a7c6dbe44222e9c6663526d616dddb22a6e9ef8dc63e88686fbdd3b88e3de06
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_004-1a}
body:
  text: 餘杭羅隱昭諫詩詠月湖上風髙動白蘋暫延清景此逡巡隔年違别成何事半夜相看似故人蟾向靜中矜爪距兔隈明處弄精神常娥老大應惆悵倚泣蒼蒼桂一輪宿荆州江陵館西游象闕愧知音東下荆溪稱越吟風動芰荷香四散月明樓閣影相侵間欹别枕千般夢醉送征帆萬里心薜荔衣裳木蘭楫異時煙雨好追尋撫州别阮兵曹雪時天外見諸峯幽軋行輪有去踨內史宅邊今獨恨步兵廚畔舊相容十年别鬢疑朝鏡千里歸心著晚鍾若不他時更青眼未知誰肯薦臨卭新安投所知少年容易捨樵漁曽辱明公薦子虛漢殿夜寒時不食宋都風急命何踈雲埋野艇吟歸去草沒山田賦遂初長劒一尋歌一奏此心爭肯為鱸魚江邊有寄江邊舊業半雕殘每軫歸心即萬端狂折野梅山店暖醉聽村笛酒樓寒只言聖代謀身易爭奈貧儒得路難同病同憂更何事為君提筆畫漁竿送友人歸夷門二年流落大梁城每送君歸即有情别路算來成底事舊遊言著似前生花荒懶認詞人㑹門在空憐烈士名至竟男兒分應定不須惆悵谷中鶯湘中見進士喬詡吳公臺下别經秋破虜城邊暫駐留一笑有時堪解夢數年無處不同遊雲牽楚思橫漁艇柳送鄉心入酒樓且酌松醪依舊醉誰能相見向春愁上霅川裴郎中貴提金印出咸秦蕭灑江城兩度春一泒水清疑見膽數重山翠欲留人望崇早合歸黃閣詩好何妨戀白蘋自是受恩心未足却垂雙翅羡吳均錢塘江潮怒聲汹汹勢悠悠羅剎江邊地欲浮漫道往來存大信也知返覆向平流任拋巨浸疑無底猛過西陵只有頭至竟朝昏誰主掌好騎赤鯉問陽侯送人赴職任褒中物態時情難重陳夫君此去莫傷春男兒只要有知己才子何堪更問津萬轉江山通蜀國兩行珠翠見褒人海棠花謝東風老應念京都共苦辛臨川投穆中丞試將生計問蓬根心委寒灰首戴盆翅弱未知三島路舌頑虛棹五侯門嘯煙白狖沉髙木搗月清砧觸旅魂家在碧江歸不得十年漁艇長苔痕早春送張坤歸大梁蕭蕭羸馬正塵埃又送歸軒向吹臺别酒莫辭今夜醉故人知是幾時回泉經華嶽猶應凍花到梁園始合開為謝東門抱關吏不堪惆悵滿離杯東歸途中作村橘蒼黃覆釣磯早年生計近年違老知風月終堪恨貧覺家山不易歸别鴈客帆知岸落逺程霜葉向人飛買臣嚴助精靈在應笑無成一布衣送進士臧濆下第後歸池州賦成無處換黃金却向春風動越吟天子愛才雖仄席諸生多病又沾襟柳攀灞岸狂遮袂水憶池陽渌滿心珍重綵衣歸正好莫將間事繫升沉湘中贈范鄖丹桂無心彼此諳二年踈懶共江潭愁如酒盞終難捨老覺人情轉不堪雲外鴛鸞非故舊眼前膠􅃮是煙嵐勞歌一奏霜風暮擊折湘妃白玉簮寄張侍郎衰羸豈合話荆州爭奈恩多不自由無路重趨桓典馬有詩曽上仲宣樓塵銷别跡堪垂淚樹拂他門懶舉頭一種人間太平日獨教零落憶滄洲渚宫愁思楚城日暮煙靄深楚人駐馬還登臨襄王臺下水無賴神女廟前雲有心千載是非難重問一江風雨好間吟欲招屈宋當時魄蘭敗荷枯不可尋間居早秋槐杪清蟬煙雨餘蕭蕭涼葉墜衣裾噪槎鳥散沉蒼嶺弄杵風髙上碧虛百歲夢生悲蛺蝶一朝香死泣芙蕖六宫誰買相如賦團扇恩情日日踈建康潮平逺岸草侵沙東晉衰來最可嗟庾舅巳能窺帝室王郎還是預人家山寒老樹啼風曲泉暖枯骸動芷牙欲起九原看一遍秦淮聲急日西斜送舒州宿松縣傅少府離江漠漠樹重重東過清淮到宿松縣好也知臨浣水官間應得看灊峯春生緑野吳歌怨雪霽平郊楚酒濃留取餘杯待張翰明年歸棹一從容經故洛陽城敗垣危堞跡依稀試駐羸驂吊落暉跋扈以成梁冀在簡書雖問杜喬歸由來丗事須翻覆未必餘材解是非千載昆陽好功業與君門下作恩威夏州胡常侍百尺髙臺勃勃州大刀長㦸漢諸侯征鴻過盡邊雲闕戰馬間來塞草秋國計巳推肝膽許家財不為子孫謀仍聞隴蜀由多事深喜將軍未白頭寄進士盧休半年池口恨萍蓬今日思量巳夢中遊子馬蹄難重到故人樽酒與誰同山橫翠後千層緑蠟想歌時一燼紅從此客程君不見麥秋梅雨遍江東贈先輩令狐補闕中閒聲跡早薰然阻避鈞衡過十年碧海浪髙終濟物蒼梧雲好巳歸天花迎綵服離鶯谷柳旁東風觸馬鞭應念凄涼洞庭客夜深雙淚憶漁船送秦州從事一枝何足解人愁拋却還隨定逺侯紫陌紅塵今別恨九衢雙闕夜同遊芳時易失勞行止良㑹難期且駐留若到邊庭有來使試批書尾話梁州湖州裴郎中赴闕後投簡寄友生錦帳郎官塞詔年汀州曽駐木蘭船禰衡酒醒春瓶到柳惲詩成海月圓歌蹙逺山珠滴滴漏催香燭淚連連使君入拜吾徒在宣室他時豈偶然秋日泊平望驛寄太常裴郎中蘋洲重到杳難期西倚郵亭憶往時北海樽中常有酒東陽樓上豈無詩地清每負生靈望官重方升禮樂司聞說江南舊歌曲至今猶自唱吳姬西塞山吳塞當時指此山吳都亡後水孱顔嶺梅乍暖殘粧恨沙鳥初晴小隊間波闊魚龍應混雜壁危猿狖正姧頑㑹將一副寒蓑笠來與漁翁作往還秋日汴河客舍酬友人梁宋追遊早歲同偶然違别事皆空年如流水催何急道似危途動即窮醉舞且欣連夜月狂吟還聚上樓風煩君更枉騷人句白鳯靈蛇滿袖中東歸仙桂髙髙似有神貂裘弊盡取無因唯將白髮期公道不覺丹枝屬别人雙闕往來慙請謁五湖歸後恥交親盈槃紫蟹千巵酒添得臨歧淚滿巾廣陵李僕射借示近詩因投獻朝論國計暮論兵餘力由隨鳯藻生語繼槃盂拋俗格氣兼河嶽帶商聲間尋綺思千花麗靜想髙吟六義清天柄巳持堯典在更堪回首問緣情重過三衢哭孫貟外爛柯山下忍重到雙檜樓前日欲殘華屋未移春照灼故侯何在淚瀾汍不唯濟物工夫大長憶容才尺度寬一慟旁人莫相笑知音衰盡路行難篋中得故王郎中書鳯里前年别望郎丁寧唯恐滯吳鄉勸踈杯酒知妨事乞與書題作褁糧蘋鹿未能移海曲縣花尋巳落河陽九原自此無因見返覆遺蹤淚萬行淚逼臉撗頥咽復勻也曽讒毀也傷神自從魯國澘然後不是姧人即婦人子規銅梁路逺草青青此恨那堪枕上聽一種有冤由可報不如銜石疊滄溟姑蘇臺讓髙泰伯開基日賢見延陵復命時未㑹子孫因底事解崇臺榭為西施王濬墓男兒未必盡英雄俱到時來命即通若使吳都由王氣將軍何處事殊功京中晚望心如野鹿跡如萍謾向人間性一靈往事不知多少夢夜來和酒一時醒寄竇澤處士二首蘭亭醉客舊知聞欲問平安隔海雲不是金陵錢太尉丗間誰肯更容身鼇背樓臺拂白榆此中槎客亦踟蹰牢山道士無仙骨却向人間作酒徒甲乙集卷第四
