front:
  text: 甲乙集卷第五
  hash: sha256:e6ba77427923369f46d10ba9bb82f7695d82f4bf662ea775ff8dddac412e983e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_005-1a}
body:
  text: 餘杭羅隱昭諫詩省試秋風生桂枝涼吹從何起中宵景象清漫隨雲葉動髙傍桂枝生漠漠看無際蕭蕭别有聲逺吹斜漢轉低拂白榆輕寥泬工夫大乾坤歳序更因悲歸客長望一枝榮思故人故人不可見聊復拂鳴琴鵲繞風枝急螢藏露草深平生四方志此夜五湖心惆悵友朋盡洋洋漫好音􅀉陸􅀛蒙李相公在淮南徵陸􅀛蒙詩龍樓李丞相昔歳仰髙文黃閣㝷無主青山竟未焚夜船乗海月秋寺伴江雲却恐塵埃裏浮名􅀧汚君題方干詩中間李建州夏汭偶同遊顧我論佳句推君最上流九霄無鶴板􅀟􅁂老漁舟丗難方如此何當浣旅愁秋江秋江待晚潮客思斾旌遥細雨翻蘆葉髙風却柳條兵戈村落破飢儉虎狼驕吾土兼連此離魂望裏銷􅀉制誥李舎人梁王握豹韜雪裏見枚皐上客趨丹陛遊人歎二毛門閑知待詔星動想濡毫一首長陽賦應嫌索價髙秋日懷孟夷庚秋日黃陂下􅀌舟憶共誰江山三楚分風雨二妃祠知巳秦貂没流年賈鵩悲中原正兵馬相見是何時送李右丞分司分曹得洛川讜議更昭然左省曽批勑中臺肯避權所悲時漸薄共賀道由全賣與清平代相兼直幾錢郴江遷客不是逢清丗何由見皂囊事雖危虎尾名勝汨鴛行毒霧郴江闊愁雲楚驛長歸時有詩賦一爲吊沉湘感舊劒佩孫弘閤戈鋌太舊營重言虚有位􅀌立竟無成丘壠笳簫咽池臺歳月平此恩何以報歸處是柴荆鷹越海霜天暮辭韜野草乾俊通司􅊢職嚴奉武夫官眼惡藏蜂在心麤逐物殫近來脂膩足驅遣不妨難秋日􅀉狄補闕紅塵擾擾間立馬看南山謾道經年往何妨逐日閑病中霜葉赤愁裏鬢毛斑不爲良知在驅車巳出關􅀉易定公乗億謝舞仍宫柳髙竒丗少􅀟侍中生不到園令死須降班秩通烏府罇罍奉碧幢昭王有餘烈試爲禱迷􅀖􅀉大理徐郎中佐􅁄竟誰同因思證聖中事難忘顯報理合有隂功官序詵枝老幽塵范甑空幾時潘好禮重與話清風􅀉蘇拾遺早歳長楊賦當今諫獵書格髙時輩伏言數宦情踈慷􅁣傳丹桂艱難保舊居退朝藁草能望馬相如􅀉許融多病仍踈拙唯君與我同帝郷年共老江外業俱空燕冷辭華屋蟬涼咽晚叢白雲髙幾許全屬採芝翁􅀉禮部鄭貟外欒郄門風大裴王禮樂優班資冠雞舌人品􅎹龍頭夜直爐香細晴編䟽草稠聞潘散􅀐三十二悲秋菊籬落歳云暮數枝聊自芳雪裁纎蘂宻金坼小苞香千載白衣酒一生青女霜春叢莫輕薄彼此有行藏臺城水國春長在臺城夜未寒麗華承寵渥江令捧杯盤宴罷明堂爛詩成寶炬殘兵來吾有計金井玉构欄舊遊良時不復再漸老更難言逺水猶經眼髙樓似斷魂依依宋玉宅歷歷長卿村今日空江畔相於只酒罇􅀉䖍州薛大夫祝融峯下别三載夢魂勞地轉南康重官兼亞相髙海鵬終負日神馬背眠槽㑹得窺成績幽䆫染兎毫蘇小小墓魂􅀆擕里城由未有人耕好月當年事殘花觸處情向誰曽艶冶隨分得聲名應待呉王日蘭橈暗送迎寒食日早春城東青門欲曉天車馬巳喧闐禁柳踈風細墻花拆露鮮唯言誇麗景只是歎流年不得髙飛便迴頭望帶鳶秋日懷賈隋進士邊宼日搔動故人音信稀長纓慚賈􅁩􅀌􅊘憶韓非曉匣魚腸冷春園鴨掌肥知君安未得聊且示忘機亂後逢友人滄海去未得􅀝舟聊問津生靈㓂盗盡方鎮改更貧夢裏舊行處眼前新貴人從來事如此君莫獨沾巾殘花巳歎良時晩仍悲别酒催暖芳隨日薄輕片逐風迴黛歛愁歌扇粧殘泣鏡臺繁隂莫矜衒終是共塵埃秋日冨春江行逺岸平如翦澄江靜似鋪紫鱗仙客馭金顆李衡奴冷疊羣山闊清凾萬象殊嚴陵亦髙見歸卧是良圖􅀉侯博士規諫􅀭雄賦邅迴賈􅁩官乆貧還往少􅀌立轉遷難清鏡流年急髙槐旅舎寒侏儒亦何有飽食向長安送沈光侍御赴職閩中未至應居全家出帝郷禮優逢苑雪官重帶臺霜夜浦呉潮亂春灘建水狂延平有風雨從此是騰驤􅀉􅀽皓侍郎東堂失路歧榮辱事堪悲我寢牛衣弊君居象角危風塵慚上品才業愧明時千里芙蓉幕何由話所思􅀉金吾李蓀常侍西班掌禁兵蘭錡最分明曉色嚴天仗春寒避火城安危雖巳任韜略即嘉聲請問何功德壷關㓂始平商驛與于韞玉話別南朝徐􅁃流洛下憶同遊酒採閑坊菊山登逺寺樓相思勞􅀉夢偶别巳經秋還被青青桂催君不自由封禪寺居盛禮何由覩嘉名偶􅀉居周南太史淚蠻徼長卿書砌竹揺風直庭花泣露踈誰能賦秋興千里隔吾廬錢志士不敢道貯之成禍胎小人無事蓺假爾作梯媒解釋愁腸結能分睡眼開朱門狼虎性一半逐君迴投􅀉韋右丞赤壁徵文聘中臺拜郄詵官資參令僕曹署轄星辰幞被從誰起持綱自此新舉朝明典教封納詔書頻禁樹曽摛藻臺烏舊避塵便應酬􅀝注何處話窮鱗紅葉不柰荒城畔那堪晚照中野情霜裛緑山冷雨催紅遊子霸陵道美人長信宫等閑居歳暮揺落意無窮期徐道者不至遼鶴虚空語冥鴻未易親偶然來即是必擬見無因霜霰窮冬冷杯盤旅舎貧只應薊子訓醉後􅂴分身歳除夜官曆行將盡村醪強自傾猒寒思暖律畏老惜殘更歳月巳如此㓂戎猶未平兒童不諳事歌次待天明雪盡道豐年瑞豐年事若何長安有貧者爲瑞不冝多旅夢旅夢思遷次窮愁有歎嗟子鵝京口逺粳米㑹稽賖漏澁纔成滴燈寒不作花出門聊一望蟾桂向人斜秋􅀉張坤庭樹巳黃落閉門俱寂寥未知棲托處空羡聖明朝酒醒郷心闊雲晴客思遥吾徒自多感顔子只簞瓢傷華髮舊國迢迢逺清秋種種新巳衰曽軫慮初見忽沾巾日薄梳兼􅂴根危鑷恐頻青銅不自見只擬老他人九江早秋雨過晚涼生樓中枕簟清海風吹亂木巖磬落􅀌城百歳幾多日四蹄無限程西隣莫髙唱俱是别離情初秋􅀉友人九華曽屏跡罹亂與心違是處堪終老新秋又未歸病中芳草歇愁裏白雲飛樵侣兼同志音書近亦稀秋居有􅀉端居湖岸東生計有無中魘處千般􅀑寒時百種風性靈從道拙心事奈成空多謝金臺客何當一􅀏同雪霽南山雪乍晴寒氣轉崢嶸鎻却閑門出隨他駿馬行一竿如有計五鼎豈須烹秋見天街草青青又欲生堠子終日路歧旁前程亦可量未能慚面黒只是恨頭方雅㫖逾千里髙文近兩行君知不識字第一莫形相初夏􅀉顧紹宗江上偶分袂四回寒暑更青山無路入白髮滿頭生郢浦鴈㝷過鏡湖蟬又鳴憐君未歸日杯酒若爲情􅀉第五尊師苕溪煙月乆因循野鶴衣裘獨蠒綸只說泊船無定處不知攜手是何人朱黃㨂日囚尸􅀑青白臨時注腦神欲訪先生問經訣丗間難得自由身􅀉西華黃錬師西華有路入中華依約山川認永嘉羽客昔時留篠簜故人今又種煙霞壇髙巳降三清鶴海近應通八月槎盛事兩般君揔得老萊衣服戴顒家所思西上青雲未有期東浮滄海去何遲酒闌夢覺不稱意花落日明空所思長恐病侵多事日可堪忙過少年時闘雞走犬五陵道惆悵輸他輕薄兒甲乙集卷第五
