seq: 2
front:
  text: 輕才子好謁尤常醉少年萬里故郷雲縹緲一春生計淚瀾汍多情柱史應相問與話歸心正浩然
  hash: sha256:decc947afab7a8c2d02877a90b1759daeda070f87cebffcb8b1bb7513f9c10a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_002-1a}
body:
  text: 清明日曲江懷友君與田蘇即舊遊我於交分亦綢繆二年隔絶黃泉下盡日悲涼曲水頭鷗鳥似能齊物理杏花疑欲伴人愁寡妻稚子應寒食遥望江陵一淚流送鄭州嚴貟外欲將刀筆潤王猷東去先分聖主憂滿扇好風揺鄭圃一車甘雨别皇州尚書磧冷鴻聲晚僕射陂寒樹影秋從此文星在何處武牢關外􅁃公樓孫貟外赴闕後重到三衢逺山髙樹思悠哉重􅀝危樓盡一杯謝守巳隨徴詔入魯儒猶逐斷蓬來地寒謾憶移暄手時急方須濟丗才宣室夜䦨如有問可能全忘未燃􅁅衡陽泊木居士廟下作鳥噪殘陽草滿庭此中枯木似人形只應水物長爲主未必浮槎即有靈八月風波飄不去四時􅁰稷薦惟馨南朝􅁃信無因賦牢落祠前水氣腥鍾陵見楊秀才孺亭􅅬閣少踟蹰三度南遊一事無秪覺流年如鳥逝不知何處有龍圖雲歸洪井枝柯歛水下漳江氣色麤賴得與君同此醉醒醒爭柰􅀍椰榆自湘川東下立春泊口阻風登孫權城吳門此去逾千里湘浦離來想數旬只見風師長占路不知青帝巳行春危憐壞堞猶遮水狂愛寒梅欲傍人事往時移何足問且憑村酒暖精神春日憶湖南舊遊􅀉盧校書旅榜前年過洞庭曽提刀筆事甘寧玳筵離隔將軍幕朱履頻窺處士星校書自處士受命尔恩重匣中􅀌劒在夢餘江畔數峯青金貂見鵩嘉賔散迴首昭丘一涕零賀淮南節度盧貟外賜緋儉蓮髙貴九霄聞粲粲朱衣降五雲騘馬早年曽避路銀魚今日且從軍御題綵服垂天眷袍展花心透榖紋應􅀏當年老萊子鮮華都自降明君春日獨遊禪智寺逺樹連天水接空幾年行樂舊隋宫花開花謝還如此人去人來自不同鸞鳯調髙何處酒呉牛蹄健滿車風思量只合騰騰醉煑海平陳一夢中和淮南李司空同轉運貟外層層髙閣舊瀛洲此地須徵第一流丞相近年榮􅀝望重才今日喜遨遊榮持健筆金黃貴恨咽離筵筦吹秋誰繼伊臯送行句梁王詩好郢人愁后土廟四海兵戈尚未寧始於雲水學儀形九天玄女猶無聖后土夫人豈有靈一戴好雲侵鬢緑兩層危岫拂眉青韋郎年少知何在端坐思量太白經金陵夜泊冷煙輕傍衰叢此夕秦淮駐斷蓬栖鳥逺驚沽酒火亂鵶髙避落帆風地銷旺氣波聲急山帶秋隂樹影空六代精靈人不見思量應在月明中上江州陳貟外寒江九派轉城樓東下鍾陵第一州人自中臺方貴盛地從西􅀳即風流舊班乆望鵷晴翥餘力猶聞虎夜浮應恨屬官無健令異時佳節阻閑遊廣陵開元寺閣上作滿檻山川漾落暉檻前前事去如飛雲中鷄犬劉安過月裏笙歌􅌆帝歸江蹙海門帆散出地吞淮口樹相依紅樓翠幕知多少長向東風有是非上鄂州韋尚書往歳先皇馭九州侍臣才業最風流文窮典誥雖餘力俗致雍熈盡密謀蘭省換班青作綬柏臺前引絳爲韝都縁未負江山興開濟生靈校一秋早春巴陵道中逺雪亭亭望未銷岳陽春淺似相饒短蘆冒土初生笋髙柳偷風巳弄條波泛洞庭獱􅆩健谷連荆楚􅀑神妖中流菱唱泊何處一􅃗􅀞船蘭作橈廣陵秋日酬進士臧濆見􅀉驛西斜日滿䆫蟬獨凭秋欄思渺然數尺斷蓬慙故國一輪清鏡泣流年巳知丗事眞徒尔縱有心期亦偶焉空媿荀家好兄弟鴈來魚去是因縁送淮南李司空朝覲聖君霄旰望時雍丹詔西來雨露濃宣父道髙休歎鳯武侯才太本吟龍九州似鼎終須負萬物爲銅秪待鎔臘後春前更何事便看經度奏東封秋日禪智寺見裴郎中題名􅀉韋贍野寺踈鍾萬木秋偶㝷題處認名侯官離南郡應閑暇地勝東山想駐留百盞醲醪成别夢兩行垂露浣羇愁心知只有韋公在更對眞蹤話舊遊廣陵春日憶池陽有􅀉煙水濛濛接板橋數年經歷駐征橈醉凭危檻波千頃愁􅀝長亭柳萬條别後故人冠􅞄豸病來知己賞鷦鷯清流夾宅千家住㑹待閑乗一信潮春中湘中題岳麓寺僧舎蟾宫虎穴兩皆休來凭危欄送逺愁多事林鶯還謾語薄情邊鴈不迴頭春融只待乾坤醉水闊深知丗界浮欲共髙僧話心跡野花芳草柰相尤出試後投所知此去蓬壷兩日程當時消息甚分明桃須曼倩催分熟橘待洪崖遣始行島外音書應有意眼前塵土漸無情莫交更似西山鼠嚙破愁腸恨一生湘南春日懷古晴江春暖蘭蕙薫鳬鷖苒苒鷗着羣洛陽賈􅁩自無命少陵杜甫兼有文空闊逺帆遮落日蒼礙歸雲松醪酒好昭潭靜閑過中流一弔君江州望廬山東南蒼翠何崔嵬横流一望幽抱開影寒巳冷水底去脚闊欲過湖心來深處不唯容􅀑怪暗中兼恐有風雷仙人往往今誰在紅杏花香重首迴金陵􅀉竇尚書二年歧路有西東長憶優遊楚驛中虎帳談髙無客繼馬卿官傲少人同丗危肯使依劉表山好猶能憶謝公此去此恩言不得謾將閑淚對春風清溪江令公宅蠻牋象筦夜深時曽賦陳宫第一詩宴罷風流人不見廢來蹤跡草何冝鶯憐勝事啼空卷蝶戀餘芳舞好枝還有往年金甃井牧童樵叟等閑窺鄭州獻盧舎人時本官王令公􅀵復兩京後海槎閑暇閬風輕不是安流不肯行雞省露濃湯餅熟鳯池煙暖詔書成漁籌巳合光儒夢堯印何妨且治兵㑹待兩都收復後右圖儀表左題名别池陽所居黃塵初起此留連火耨刀耕六七年雨夜老農傷水旱雪晴漁父共舟船已悲丗亂身須去肯愧途危跡屢遷却是九華山有意列行相送到江邊送内使周大夫自杭州朝貢入都上將近平戎便附輶軒奏聖聦三變駕前朝覲禮一函江表戰征功雲間閬闕何時見水底瑶池觸處通知有殿庭餘力在莫辭消息􅀉西風酬黃從事懷舊見􅀉舊遊不合到心中把得君詩意亦同水館酒䦨清夜月香街人散白楊風長䋲繫日雖難絆辯口談天不易窮丗事自隨蓬轉在思量何處是飛蓬繡一片緑羅洞房西室女工勞花隨玉指添春色鳥逐金針長羽毛蜀錦謾誇聲自貴越綾虚說價功髙可中用作鴛鴦被紅葉枝枝不礙刀西施家國興亡自有時呉人何苦進西施西施若解傾吳國越國亡來又是誰自遣得即髙歌失即休多愁多恨亦悠悠今朝有酒今朝醉明日愁來明日愁白角箆白似瓊瑶滑似苔隨梳伴鏡拂塵埃莫言此箇尖頭物幾度撩人惡髮來銅雀臺強歌強舞竟難勝花落花開淚滿纓秪合當年伴君死免交憔悴望西陵鸚鵡莫恨雕籠翠羽殘江南地暖隴西寒勸君不用分明語語得分明出轉難金錢花占得佳名繞樹芳依依相伴向秋光若交此物堪收貯應被豪門盡斸將梅天賜烟脂一䏞腮盤中磊落笛中哀雖然未得和羮便曾與將軍止渇來甲乙集卷第二
