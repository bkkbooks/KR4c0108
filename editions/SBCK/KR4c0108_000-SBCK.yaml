body:
  text: 餘杭羅隱昭諫第一卷曲江春感皇陂􅀉鄭補闕牡卅花黃河汴河西京崇德里居投所思經張舎人舊居維城作陪曹使君逰􅀉姑蘇曹使君送章碣赴舉􅀉楊袐書金庭勝事見示敘得竇尚書書二首雪暇日􅀉曹使君􅀉右省王諫議焚書坈始皇陵送沈先輩春日葉秀才曲江西京道德里憶夏口武牢關途中獻孟中丞長安秋夜秋晚􅀉友人春晚􅀉鍾尚書秋日有酬所思送魏校書四皓廟浮雲早發香鄴城第二卷七夕送臧潰清明日曲江懷友送鄭州嚴郎中孫貟外赴闕衡陽泊木居士廟鍾陵見楊秀才登孫權城􅀉盧校書賀盧貟外賜緋春日獨遊禪智寺送韋士赴后土廟金陵夜泊上江州陳貟外廣陵開元寺作上鄂州韋尚書早春巴陵道中酬􅆇潰見􅀉送李司空朝覲見裴郎中題名憶池陽有􅀉題岳麓寺僧舎出試後投所知湘南春日懷古江州望廬川金陵􅀉竇尚書清溪江今公宅鄭州獻盧舎人別池陽所居送内使周大夫酬黃從事見􅀉繡西施自遣白角箆銅雀臺鶯鵡金錢花梅第三卷錢尚父生日􅀉前户部陸郎中登瓦棺寺閣費徴君所居途中􅀉懷京口見李侍御秋日酬張特􅀇登髙詠菊登夏州城棲水邊偶題傷洛陽公杜陵秋思過江陵感事夜泊毗陵無錫縣桃花籌筆驛過故兵部李侍郎商驛樓東望有感􅀉南城韋逸人梅花髙駢所造迎仙樓和禪月大師見贈謁文宣王廟代文宣王荅重送朗州張貟外秋夜讀常修三篇逼試投所知漢江上作秋夜􅀉進士顧榮􅀉渭北徐從事徐㓂南逼感事􅀉三衢孫貟外送盧端公歸臺煬帝陵馬嵬坡柳隋堤柳孟浩然墓秦紀仙掌第四卷詠月宿荆州江陵館撫州别阮兵曹新安投所思江邊有􅀉送友人歸夷門湘中見進士喬詡上霅川裴郎中錢塘江潮送人赴職任褒中臨川投穆中丞早春送張坤東歸途中作送臧濆歸池州湘中贈范鄖􅀉張侍郎渚宫愁思閑居早秋建康送傅少府經故洛陽城夏州胡常侍􅀉進士盧休贈先輩令狐補闕送秦州從事裴郎中赴闕秋日􅀉裴郎中西塞山秋日客舎酬友人東歸李僕射􅂘孫貟外篋中得王郎中書淚子規姑蘇臺王濬墓京中晩望􅀉竇澤處士二首第五卷秋風生桂枝思故人􅀉陸􅀛蒙題方干詩秋江􅀉制誥李舎人秋日懷孟夷庚送李右丞分司郴江遷客感舊鷹秋日􅀉狄補闕􅀉易定公乗億􅀉大理徐郎中􅀉蘇拾遺􅀉許融􅀉禮部鄭貟外菊臺城舊遊􅀉䖍州薛大夫蘇小小墓寒食日早春城東秋日懷賈惰進士亂後逢友人殘花秋日冨春江行􅀉侯慱士送沈光侍御􅀉􅀽皓侍御􅀉金吾李蓀常侍與于韞玉話别封禪寺居錢投􅀉韋右丞紅葉期徐道者不至歳除夜雪旅夢秋􅀉張坤傷華髮九江早秋初秋􅀉友人秋居有􅀉雪霽堠子初夏􅀉顧紹宗􅀉第五尊師􅀉西華黃鍊師所思第六卷送蕭中丞赴闕送人歸湘中自貽暇日感懷􅀉呉蛻偶興題鑿石山僧院圉城偶作烏程送楊錬師暇日投錢尙父覽齊史感别元帥尙父尚父建小樓三首題􅀇同先生草堂三首城西作冬暮城西曉眺秋霽後茅齋使者途中逢劉知逺遁跡隴頭水秦中冨人思歸行即事中元甲子魏城􅑮故人游江夏口春思黃鶴驛偶題安陸贈徐礪􅀉鍾常侍中秋夜不見月羅令公附卷有迴􅀉處黙師病中上錢尚父第七卷送梅處士歸寧國經故友所居大梁從事居汜水杜處士新居絶境雪中懷故人秋晚昇遷橋姑蘇眞娘墓靈山寺􅀝棹秋夕對月􅀉徵士魏貟外宿彭蠡館螢早秋宿葉隨所居蝶春居輕飈燕陜西晚思除夜􅀉張逹􅀉羅令公五首投錢塘元帥尚父又錢塘府亭野狐泉宿紀南驛贈無相禪師遣興江南酬髙崇節鶯聲放玉臺體第八卷戲呈義興邑宰聽琵琶經林工部墓題張逸人所居昇平公主舊第􅀉黔中王從事關亭春望􅀉徐濟進士􅀉韋贍霅溪晚泊􅀉裴庶子送姚安之赴任􅀉喬逸人塞外裴庶子除太僕卿詠史中元夜泊淮口􅀉池州鄭貟外歸夢送溪州使君送霅川鄭貟外酬􅀉右司李貟外蓮塘驛甘露寺火後春日登石頭故城送宣武徐巡官冬暮􅀉裴郎中駕幸蜀四首題潤州妙善前石羊􅀉竇常侍臺城看雪上周相公􅀉陸郎中昆仲偶題故都董仲舒獻尚父大王蜂簾二首第九卷送顧雲下第村橋送劉校書官池秋夕奉使宛陵金陵思古送王使君赴蘇臺憶九華送裴饒歸㑹稽送程尊師之晉陵􅀉句曲道友貴池曉望􅀉崔慶孫􅀉􅀭袐書酬章處士見􅀉送丁明府赴任􅀉前宣州竇常侍秦望山僧院送光禄崔卿赴闕􅀉程尊師定逺樓送程尊師東遊江亭别裴饒江南􅀉周僕射錢塘見芮逢江都歳暮感懷􅀉友人送張綰游鍾陵送􅈯光大師息夫人廟漂母􅊘感懷扇上􅀞牡丹書懷七夕柳羅敷水正月七日立春貴遊嚴陵灘第十卷牡丹縣齋秋晚酬友人第五將軍入道􅀉無相禪師秋日有􅀉送前南昌崔令下第作丁亥歳作北邙山三衢哭孫貟外送蘄州裴貟外重九日廣陵道中東歸别所知旅舎書懷􅀉所知二首秋思西京道中粉贈漁翁下第􅀉張坤東歸别常翰言蕳令生日晚眺野花病騘馬狄浦南康道中北固亭東望􅀉黙師華清宫韓信廟韋公子望思臺帝幸蜀王夷甫鷺鷥書淮隂侯傳青山廟小松竹漫天嶺甲乙集目録
