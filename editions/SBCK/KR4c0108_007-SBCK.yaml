front:
  text: 甲乙集卷第七
  hash: sha256:fcf5bdd4b325466149e564707eaf68dff7c18c24c7de568e69b5993677d8c2d7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_007-1a}
body:
  text: 餘杭羅隱昭諫詩送梅處士歸寜國十五年前即别君别時天下未紛紜亂罹且喜身俱在存没那堪耳更聞良㑹謾勞悲曩跡舊交誰去弔荒墳慇懃爲謝逃名客想望千秋嶺上雲經故友所居槐花漠漠向人黃此地追遊跡巳荒清論不知莊叟逹死交空嘆趙岐忙病來未忍言閑事老去唯知覔醉郷日暮街東䇿羸馬一聲横笛似山陽大梁從事居汜水前年帝里從行塵記得仙家第四人泉暖舊諳龍隁息露寒初見鶴精神歌聲上榻梁園晚夢遶殘鍾汜水春知有篋中篇什在只應從此是經綸杜處士新居翠歛王孫草荒誅宋玉茅宼餘無故物時薄少深交迸笋侵行逕飢鶵出壞巢小園吾亦有多病近來抛絶境絶境非身事流年但物華水梳苔髮直風引蕙心斜凡客從題鳯膚音未勝蛙小船兼有槳始與問漁家雪中懷友人臘酒復臘雪故人今越郷所思誰把盞端坐恨無航兎苑舊遊盡􅀛臺仙路長未知鄒孟子何以奉梁王秋晚宰邑慙良術爲文愧壯圖縱饒長委命爭柰漸非夫盃酒有時有亂罹無處無金庭在何域迴首一踟􅦚昇遷橋危梁枕路歧駐馬問前時價自友朋得名因婦女知直須論運命不得逞文詞執㦸君郷里榮華竟若爲姑蘇眞娘墓春草荒墳墓萋萋向虎丘死猶嫌寂寞生肯不風流皎鏡山泉冷輕􅅂海霧秋還應伴西子香逕夜深遊靈山寺晚景聊攄抱憑欄幾蕩魂檻虚從四面江闊柰􅀌根幽徑薜蘿色小山苔蘚痕欲依師問道何處繫心猿􅀝棹􅀝棹聽隣笛沾衣認酒爐自縁悲巨室誰復爲窮途樹解將軍夢城遺御史烏直應齊始了傾酌向寒蕪秋夕對月夜月色可掬􅀝樓聊解顔未能分宼盗徒欲滿闗山背冷金蟾滑毛寒玉兎頑姮娥謾偷藥長寡老中間􅀉徴士魏貟外家遁蘇門節清貧粉署官不矜朝命重只恨路行難䆫曉雞譚倦庭秋蝶夢闌羡君歸未得還有釣魚竿宿彭蠡館􅀌館少年旅解鞍増别愁逺山矜薄暮髙柳怯清秋病裏見時態醉中思舊遊所懷今巳矣何必恨東流螢空庭夜未央􅀧滴度西墻抱影何微細乗時忽發􅀭不思曽腐草便擬􅀝􅀌光若道通文翰車公業肯長早秋宿葉墮所居池荷葉正圎長曆報時殫曠野雲蒸熱空庭雨始寒蝇蚊猶得志簟席若爲安浮丗知誰是勞歌共一懽蝶漢王刀筆精寫爾逼天生舞巧何妨急飛髙所恨輕野田黃雀慮山館主人情此物那堪作莊周夢不成春居東風百卉摇舊國路迢迢偶病成踈散因貧得寂寥􅀝簷髙柳弱乗露小桃妖春色常無處村醪更一瓢輕飈輕飈掠晚莎秋物慘關河戰壘平時少齋壇上處多楚雖屈子重漢亦憶廉頗不及雲臺議空山老薜蘿燕不必嫌溧露何妨養羽毛漢妃金屋逺盧女杏梁髙野逈􅀟飛急煙晴對語勞猶勝黃雀在棲息是蓬蒿陜西晚思長途巳自窮此去更西東􅀣色榮衰裏人心往返中别情流水急歸意故山空莫忘交遊分從來事一同除夜􅀉張逹梅花已着眼竹葉況粘脣只此留殘歳那堪憶故人亂罹書不逺衰病日相親江浦思歸意明朝又一春􅀉酬鄴王羅令公五首營室東迴􅄻斥丘少年承襲擁青油坐調金鼎尊明主横把琱戈列侯書札二王爭巧拙篇章七子避風流西園舊跡今應在衰老無由奉勝游脉散源分歷幾朝縱然官宦只卑僚正憂末􅂀淪滄海忽見髙枝拂絳霄十萬貔貅趨玉帳三千賔客珥金貂良時難得吾宗少應念門更寂寥敢將衰弱附強宗細筭還縁血脉同湘浦煙波無舊跡鄴都蘭菊有遺風毎憐罹亂書猶逹所恨雲泥路不通珍重珠璣兼繡叚草玄堂下􅀉􅀭雄水雲開霽立髙亭依約􅀺陽對福星只見篇章矜鏤管不知勲業柱青冥早縁入夢金方礪晚爲傳家鼎始銘鶴髮四垂煙閣逺此生何處拜儀形錦笈朱囊連復連紫鸞浙江邊綃從海室奪煙霧樂奏帝宫勝管絃長􅀏應劉悲顯逹毎嫌伊霍少詩篇戴灣老圃根基薄虚費工夫八十年春日投錢唐元帥尚父二首正憂衰耄辱金臺敢望昭王顧問來門外旌旗屯虎豹壁間章句動風雷三都節巳聮翩降兩地花應次第開若比紫髯分鼎足未聞餘力有瓊瓌征東幕府十三州敢望非才忝上游官秩巳叨呉品職姓名兼顯魯春秋鹽車頋後聲方重火井窺來熖始浮一句黃河千載事麥城王粲謾登樓錢唐府亭新恩别啓館娃宮還拜呉王向此中九牧土田周制在兩藩茅社漢儀同春生舊苑芳洲雨香入髙臺小徑風更有寵光人未見問安調膳盡三公野狐泉潏潏寒光濺路塵相傳妖物此潜身又應改換皮毛後何處人間作好人宿紀南驛䇿蹇南游憶楚朝隂風淅淅樹蕭蕭不知無忌姧邪骨又作何山野􅁑苗贈無相禪師人人盡道事空王心裏忙於市井忙唯有馬當山上客死門生路兩相忘遣興青雲路不通歸計柰長蒙老恐醫方悞窮憂酒盞空何堪罹亂後更入是非中長短遭譏􅀏迴頭避釣翁江夏酬髙崇節臘雪都堂試春風汴水行十年雖抱疾何處不無情羣盜正當路此游應隔生勞君問流落山下巳躬耕鶯聲井上梧桐暗花間霧露稀一枝晴復暖百囀是兼非金屋夢初覺玉關人未歸不堪閑日聽因爾又沾衣放玉臺體青樓枕路隅壁甃復椒塗晚夢通簾押春寒逼酒爐解吟憐芍藥難見恨菖蒲試問年多少隣􅁎亦姓胡甲乙集卷第七
