  text: 甲乙集卷第九
  hash: sha256:5c1177fabad064fcefce631fee525abb4a559d1957521d5251916e0a9cb10759
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_009-1a}
body:
  text: 餘杭羅隠昭諫詩送顧雲下第行行盃酒莫辭頻怨嘆勞歌兩未伸漢帝後宫猶識字楚王前殿更無人年深旅舎衣裳弊潮打村田活計貧百歳都來多幾日不堪相别又傷春村橋村橋酒斾月明樓偶逐漁舟繫葉舟莫學魯人疑海鳥須知莊叟惡犧牛心寒巳分􅁅無熖事往曽將水共流除却思量太平在肯抛踈散換公侯送劉校書之新安􅀉呉常侍野雲如火照行塵㑹績溪邊去問津才子省銜非末客楚君科第是同人彺思下國千􅂣醉病負東堂兩度春他日酒筵應見問鹿裘漁艇隔朱輪官池秋夕池邊月影閑婆娑池上醉來成短歌芙蓉抵死怨珠露蟋蟀苦口嫌金波往事向人言不得舊遊臨老恨空多松醪作酒蘭爲棹十載煙塵柰爾何奉使宛陵别二三從事梁王雪裏有深知偶别家郷隔路歧官品共傳勝曩日酒盃爭肯忍當時豫章地暖矜千尺越嶠天寒愧一枝還有釣魚蓑笠在不堪風雨失歸期金陵思古杜秋在時花解言杜秋死後花更繁柔姿曼態葬何處夭紅膩白愁荒原髙洞紫簫吹夢想小䆫殘雨濕精魂綺筵金縷無消息一陣征帆過海門送王使君赴蘇臺東南一望可長吁猶憶王孫領虎符兩地干戈連越絶數年麋鹿卧姑蘇疲甿賦重全家盡舊族兵侵太半無料得伍貟兼旅寓不妨招取好椰榆憶九華九華巉崪􅄻柴扉長憶前時此息機黃菊􅀝風村酒熟緑蒲低雨釣魚歸干戈巳是三年别塵土那堪萬事違迴首佳期恨多少夜闌霜露又沾衣送裴饒歸㑹􅾵金庭路指剡川隈珍重良朋自此來兩􅁂不堪悲歳月一巵猶得話塵埃家通曩分心空在丗逼横流眼未開􅀏殺山隂雪中客等閑乗興又須迴送程尊師之晉陵棟間雲岀認行軒郊外隂隂夏木繁髙道乍爲張翰侣使君兼是丗龍孫溪含句曲清連底酒貰餘杭渌滿樽莫見時危便乗興人來何處不桃源吳門晚泊􅀉句曲道友採香逕在人不留採香逕下停葉舟桃花李花􅃲紅白山鳥水鳥自獻酬十萬梅鋗空寸土二分孫䇿竟荒丘未知到了關身否􅀏殺雷平許逺游貴池曉望根莠叅天翦未平且乗􅀌棹且行行計踈狡兎無三窟羈甚賔鴻欲一生合眼亦知非本意傷心其柰是多情前溪好泊誰爲主昨夜沙禽占月明􅀉崔慶孫故人何處又留連月冷風髙鏡水邊文陣解圍纔昨日醉郷分􅃑巳三年交情澹薄應長在俗態流離且勉旃還擬山隂一乗興雪寒難得渡江船􅀉楊祕書蕭蕭簷雪打䆫聲因憶江東阮歩兵兩信海潮書不逹數峯􅾵嶺眼長明梅繁幾處垂鞭看酒好何人􅀝檻傾㑹待與君開社瓮滿船般載鏡中行酬章處士見􅀉中原甲馬未曽安今日逢君萬事端亂後幾迴郷夢隔别來何處路行難霜鱗共落三門浪雪鬢同歸七里灘何必新詩更相戲小樓吟罷暮天寒送丁明府赴紫溪任金徽玉軫肯躇蹰偶滯良途半月餘樓上酒䦨梅拆後馬前山好雪晴初欒公社在憐郷樹潘令花繁賀版輿縣譜莫辭留舊本異時度更何如􅀉前宣州竇常侍往年西謁謝􅀇暉罇酒留懽醉始歸曲檻柳濃鶯未老小園花嫰蝶初飛噴香瑞獸金三尺舞雪佳人玉一圍今日亂罹㝷不得滿蓑風雨釣魚磯春望山僧院巉巉危岫􅀝滄洲聞說秦皇亦此游霸主卷衣纔二丗老僧傳錫巳千秋隂崖水賴松根直蘚壁苔侵􅀞像愁各是病來俱未了莫將煩惱問湯休送光禄崔卿赴闕十年目斷望西轅此日殷勤聖主恩上國巳留虞􅀉命中朝應聽范汪言官從府幕歸卿寺路向干戈見禁門鵷侣寂寥曹署泠更堪嗚咽問田園􅀉程尊師鶴信雖然到五湖煙波迢遞路﨑嶇玉書分簿花生眼金鼎功遲雪滿鬚三秀紫芝勞夢寐一畨紅槿恨朝晡未知朽敗凡間骨中授先生指教無定逺樓前年上將定妖氛曽築嚴城駐大軍近日關防雖弛柝舊時欄檻尚侵雲蠻兵續盛人皆伏坐石名髙丗共聞唯恐亂來良吏少不知誰解敘功勲送程尊師東游有􅀉華蓋峯前擬卜耕主人無柰又閑行且憑鶴駕㝷滄海必恐犀軒過赤城絳簡便應朝右弼紫旄兼合見東卿勸君莫忘歸時節芝似螢光處處生江亭別裴饒行盃且待怨歌終多病憐君事事同衰􅁂别來光影裏故郷歸去亂惟中乾坤墊列三分在井邑摧殘一半空日晚長亭問西使不堪車駕尚萍蓬江南􅀉所知周僕射曽陪公子醉西園峴首碑前事􅂴言丗亂共嗟王粲老時危俱受信陵恩潮憐把盞吟江徼雨憶平闌望海門飛蓋寂寥清宴罷不知簮履更誰存錢唐見芮逢蔡倫池北鴈峯前罹亂相兼十九年所喜故人猶㑹面不堪良牧巳重泉醉思把筯欹歌席狂憶判身入酒船今日與君嬴得在戴家灣裏兩皤然江都淮王髙宴動江都曽憶狂生亦坐隅九里樓臺牽翡翠兩行鵷鷺踏眞珠歌聽麗句秦雲咽詩轉新題蜀錦鋪惆悵晉陽星拆後丗間兵革地荒蕪湖上歳暮感懷有􅀉友人雪天螢席幾辛勤同志當時四五人蘭版地寒俱受露桂堂風惡獨傷春音書乆絕應埋玉編簡難言竟委塵唯有廣都龐令在白頭罇酒憶交親送張綰游鍾陵南憶龍砂兩岸行當時天下尚清平醉眠野寺花方落吟􅀝江樓月欲明老去亦知難重到亂來爭肯不牽情西山十二眞人在從此煩君話姓名送􅈯光大師師以草書應制禹祠分首戴灣逢健筆㝷知逹九重聖主賜衣憐絶藝侍臣摛藻許髙蹤寜親乆别街西寺衘詔初離江上峯一種苦心師得了不須迴首􅀏龍鍾息夫人廟百雉摧殘連野青廟門猶見昔朝庭一生雖抱楚王恨千載終爲息地靈蟲網翠鬟終縹緲風吹寶瑟助微冥玉顔渾似羞來客依舊無言照􅀞屏漂母􅊘寂寂荒墳一水濵蘆洲絶㠀自相親青娥巳落淮邊月白骨甘爲泉下塵原上荻花飄素髮道傍菰葉碎羅巾雖然寂寞千秋魄猶是韓侯舊主人感懷石逕松軒亦自由謾隨浮丗逐飄流駑駘路結恨蟋蟀牀生半夜秋掩耳惡聞宫妾語低顔須向路人羞誰教小事相催逼未到青雲擬白頭扇上􅀞牡丹爲愛紅芳滿砌堦教人扇上􅀞將來葉隨綵筆參差長花逐輕風次第開閑掛幾曽停蛺蝶頻揺不怕落莓苔根生無地如仙桂疑是姮娥月裏栽書懷釣船抛却異郷來擬向何門用不才日晚獨登樓上望馬蹄車轍滿塵埃七夕月帳星房次第開兩情唯恐曙光催時人不用穿針待没得心情送巧來柳一簇青煙鎻玉樓半垂欄畔半垂溝明年更有新條在繞亂春風卒未休羅敷水雉聲角角野田春試駐征車問水濵數􅀣枯桑雖不語思量應合識秦人京中正月七日立春一二三四五六七萬木生涯是今日逺天歸鴈拂雲飛近水游魚迸冰出貴游館陶園外雨初晴繡轂香車入鳯城八尺家僮三尺箠何知髙祖要蒼生嚴陵灘中都九鼎勤英毛漁釣牛蓑且遁逃丗祖昇遐天子死原陵不及釣臺髙甲乙集卷第九
