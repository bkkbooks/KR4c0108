front:
  text: 甲乙集卷第八
  hash: sha256:44d3b7616e67d68a834f5dc45929ade73465a065483c78de7413f174e80e3879
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_008-1a}
body:
  text: 餘杭羅隱昭諫詩夜泊義興戲呈邑宰溪畔維舟問戴星此中三害在圖經長橋可避南山逺却恐難妨是最靈聽琵琶香筵酒散思朝散偶向梧桐晤處聞大底曲中皆有恨滿樓人自不知君經來陽今林工部墓紫菊馨香覆楚醪奠君江畔雨蕭騷旅魂自是才相累閑骨何妨塚更髙驥騄喪來空蹇蹶芝蘭衰後長蓬蒿屈原宋玉憐君處幾駕青螭緩鬱陶題袁溪張逸人所居蒲梢健健燕差差數里溪光日落時芳樹文君機上錦逺山孫壽鏡中眉雞䆫夜靜開書卷魚檻春深展釣絲若使浮名拘絆得丗間何處有男兒昇平公主舊第乗鳯仙人降此時玉篇纔罷到文詞兩輪水磑光明照百尺絞綃換好詩帶礪山河今盡在風流罇俎見無期壇埸客散香街暝惆悵齊竽取次吹寄黔中王從事故人刀筆事軍書南轉黔江半月餘别後郷關情幾許近來詩酒興何如貪將醉袖矜鶯谷不把瑶緘附鯉魚今日舉埸君莫問生涯牢落鬢蕭踈關亭春望關畔春雲拂馬頭馬前春事共悠悠風欺岸柳長條困露裛山花小朶愁越信功夫髙似狗裴王氣力大於牛未知至竟將何用渭水涇川一向流寄徐濟進士往年踈嬾共江湖月滿花香記得無霜壓楚蓮秋後折雨催蠻酒夜深酤紅塵偶别迷前事丹桂相輕愧後徒出得函關抽得手從來不及阮元瑜寄韋贍石城蓑笠阻心期落盡山花有所思羸馬二年蓬轉後故人何處月明時風催曉燕看看别雨脅秋蝇漸漸癡禪智闌干市橋酒縱然相見只相悲霅溪晚泊寄裴庶子溪風如扇雨如絲閑歩閑吟柳惲詩盃酒踈狂非曩日野花狼籍似當時道窮謾有依劉感才急應無借宼期滿眼雲山莫相笑與君俱是受深知送姚安之赴任秋浦官罷春坊地象雷片帆髙指貴池開五侯水暖魚鱗去九子山晴鴈敘來江夏黃童徒逞辯廣都龐今恐非才到頭稱意須年少贏得時光向酒盃寄喬逸人南經湘浦北揚州别後風帆幾度游春酒誰家禁爛熳野花何處最淹留欲憑尺素邊鴻懶未定雕梁海燕愁長短此行須入手更饒君占一年秋塞外塞外偷兒塞内兵聖君宵旰望昇平碧幢未作朝廷計白挺猶驅婦女行可使禦戎無上䇿只應憂國是虚聲漢皇第宅秦田土今日將軍巳自榮裴庶子除太僕卿因賀楚珪班序未爲輕莫惜良途副聖明宮省舊推皇甫謐寺曹今得夏侯嬰秩隨科第臨時貴官逐簮裾到處清應笑馬安虚巧宦四迴遷轉始爲卿詠史蠹簡遺編試一㝷寂寥前事似如今徐陵筆硯珊瑚架趙勝賔朋玳瑁簮未必片言資國計只應邪說動人心九原郝泚何由起虚誤西蕃八尺金中元夜泊淮口木葉迴飄水面平偶停孤棹巳三更秋涼霧露侵燈下夜靜魚龍逼岸行欹枕正牽題柱思隔樓誰轉遶梁聲錦帆天子狂魂魄應過揚州看月明寄池州鄭貟外獸繞朱輪酒滿船郡城蕭灑貴池邊衣同萊子曽分筆扇似袁宏别有天九點好山樓上客兩行髙柳雨中煙陵陽百姓將何福社舞村歌又一年歸夢陸海波濤漸漸深一迥歸夢抵千金路傍草色休多事墻外鶯聲肯有心日晚向隅悲斷梗夜䦨澆酒哭知音貪財敗陣誰相悉鮑叔如今不可尋送溪州使君兵㓂傷殘國力衰就中南土藉良醫鳯銜泥詔辭丹闕鵰倚霜風上畫旗官職不須輕逺地生靈只是計臨時灞橋酒盞黔巫月從此江心兩所思送霅川鄭貟外明時塞詔列分麾東擁朱輪出帝畿銅虎貴提天子印銀魚榮傍老萊衣歌聽茗塢春山暖詩詠蘋洲暮鳥飛知有掖垣南歩在可能須待政成歸酬寄右司李貟外當年憶見桂枝春自此清途未四旬左省望髙推健筆右曹官重得名人閑摛麗藻嫌秋興靜獵遺編笑過秦猶把隋和向泥滓應憐踈散任天眞蓮塘驛蓮塘館東初日明蓮塘館西行人行隔林啼鳥似相應當路好花疑有情一夢不須追往事數盃猶可慰勞生莫言來去只如此君看鬢邊霜幾莖甘露寺火後六朝勝事巳塵埃猶有閑人悵望來只道鬼神能護物不知龍象自成灰犀慙水府渾非怪燕說吳宫未是災還識平泉故侯否一生蹤跡比樓臺春日登上元石頭故城萬里傷心極目春東南王氣只逡巡野花相笑落满地山鳥自啼傍人謾道城池須險阻可知豪傑亦埃塵太平寺主惟輕薄却把三公與賊臣送宣武徐巡官傲睨公卿二十年東來西去盡悠然白知關畔元非馬玄覺壷中别有天漢帝詔銜應異日梁王風雪是初筵臨行不惜刀圭便愁殺長安買笑錢冬暮寄裴郎中曉髮星星入鏡冝早年容易近年悲敢言得事時將晚只恐酬恩日漸遲南國傾心應望速東堂開口欲從誰仙郎舊有黃金約瀝膽隳肝更禱祈中元甲子以辛丑駕幸蜀四首子儀不起渾瑊亡西幸誰人從武皇四海爲家雖未逺九此多事竟難防巳聞旰食思眞將㑹待畋游致假王應感兩朝巡狩跡緑槐端正驛荒涼爪牙柱石兩俱銷一點渝塵九土摇敢恨甲兵爲弃物所嗟流品誤清朝幾時睿筭殱張角處愚人載隗囂跪望峻山重啓告可能餘烈不勝妖邪氣奔屯瑞氣移清平過盡到艱危縱饒犬彘迷常理不柰犲狼幸此時九廟有靈思李令三川悲憶恨張儀不憐一曲還京樂重對紅蕉教蜀兒白丁攘臂犯長安翠輦蒼黃路屈盤丹鳯有情塵外逺玉龍無跡渡頭寒靜憐貴族謀身易危惜文王創業難不將不侯何計是釣魚船上淚闌干題潤州妙善前石羊傳云吳主孫權與蜀主劉備嘗此置會云紫髯桑蓋此沉吟銀石猶存事可㝷漢鼎未安聊把手楚醪雖滿肯同心英雄巳往時難問苔蘇何知日漸深還有市鄽沽酒客雀喧鳩聚話蹄涔登宛陵條風樓寄竇常侍亂罹時節懶登臨試借條風半日吟逺見晚山含曉律不知髙閣動歸心溪喧晚棹千聲浪雲護寒郊數丈隂自笑踈慵似麋鹿也教臺上費黃金臺城晚雲隂映下空城六代纍纍夕照明玉井巳乾龍不起金甌雖破虎曽爭亦知罷丗才難得却是窮塵事最平深谷作陵山作海茂弘流輩莫傷情甘露寺看雪上周相公篩寒灑白亂溟濛禱請功兼造化功光薄乍迷京口月影交初轉海門風細粘謝客衣裾上輕墮梁王酒盞中一種爲祥君看取半攘災沴半年豐寄京闕陸郎中昆仲栢臺蘭署四周旋賔榻何妨鴈影連纔見玳簮欹細柳便知油幕勝紅蓮家從入洛聲名大跡爲依劉事分偏爭柰亂罹人漸少麥城新賦許誰傳偶題鍾陵醉别十餘春重見雲英掌上身我未成名君未嫁可能俱是不如人故都江南江北兩風流一作迷津一拜侯至竟不如隋煬帝破家猶得到揚州董仲舒災變儒生不合聞謾將刀筆指乾坤偶然留得隂陽術閉却南門又北門獻尚父大王數年鐵甲定東甌夜渡江山瞻斗牛今日朱方平殄後虎符龍節十三州蜂不論平地與山尖無限風光盡被占採得百花成蜜後不知辛苦爲誰甜簾二首疊影重紋映畫堂玉鈎銀燭共熒煌㑹應得見神仙在休下眞珠十二行翡翠佳名丗共稀玉堂髙下巧相冝殷勤爲囑纎纎手捲上銀鈎莫放垂甲乙集卷第八
