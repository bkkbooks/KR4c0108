front:
  text: 甲乙集卷第五
  hash: sha256:e6ba77427923369f46d10ba9bb82f7695d82f4bf662ea775ff8dddac412e983e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_005-1a}
body:
  text: 餘杭羅隱昭諫詩省試秋風生桂枝涼吹從何起中宵景象清漫隨雲葉動髙傍桂枝生漠漠看無際蕭蕭别有聲逺吹斜漢轉低拂白榆輕寥泬工夫大乾坤歲序更因悲歸客長望一枝榮思故人故人不可見聊復拂鳴琴鵲繞風枝急螢藏露草深平生四方志此夜五湖心惆悵友朋盡洋洋漫好音寄陸龜蒙李相公在淮南徵陸龜蒙詩龍樓李丞相昔歲仰髙文黃閣尋無主青山竟未焚夜船乘海月秋寺伴江雲却恐塵埃裏浮名點汚君題方干詩中間李建州夏汭偶同遊顧我論佳句推君最上流九霄無鶴板雙鬢老漁舟丗難方如此何當浣旅愁秋江秋江待晚潮客思斾旌遙細雨翻蘆葉髙風却柳條兵戈村落破飢儉虎狼驕吾土兼連此離魂望裏銷寄制誥李舍人梁王握豹韜雪裏見枚皋上客趨丹陛遊人歎二毛門間知待詔星動想濡毫一首長陽賦應嫌索價髙秋日懷孟夷庚秋日黃陂下孤舟憶共誰江山三楚分風雨二妃祠知巳秦貂沒流年賈鵩悲中原正兵馬相見是何時送李右丞分司分曹得洛川讜議更昭然左省曽批勑中臺肯避權所悲時漸薄共賀道由全賣與清平代相兼直幾錢郴江遷客不是逢清丗何由見皂囊事雖危虎尾名勝汨鴛行毒霧郴江闊愁雲楚驛長歸時有詩賦一為吊沉湘感舊劒佩孫弘閣戈鋌太舊營重言虛有位孤立竟無成丘壠笳簫咽池臺歲月平此恩何以報歸處是柴荆鷹越海霜天暮辭韜野草乾俊通司􅊢職嚴奉武夫官眼惡藏蜂在心粗逐物殫近來脂膩足驅遣不妨難秋日寄狄補闕紅塵擾擾間立馬看南山謾道經年往何妨逐日間病中霜葉赤愁裏鬢毛斑不為良知在驅車巳出關寄易定公乘億謝舞仍宫柳髙竒丗少雙侍中生不到園令死須降班秩通烏府樽罍奉碧幢昭王有餘烈試為禱迷邦寄大理徐郎中佐棘竟誰同因思證聖中事難忘顯報理合有隂功官序詵枝老幽塵范甑空幾時潘好禮重與話清風寄蘇拾遺早歲長楊賦當今諫獵書格髙時輩伏言數宦情踈慷慨傳丹桂艱難保舊居退朝藁草能望馬相如寄許融多病仍踈拙唯君與我同帝鄉年共老江外業俱空燕冷辭華屋蟬涼咽晚叢白雲髙幾許全屬採芝翁寄禮部鄭貟外欒郤門風大裴王禮樂優班資冠雞舌人品壓龍頭夜直爐香細晴編疏草稠聞潘散騎三十二悲秋菊籬落歲云暮數枝聊自芳雪裁纎蘂密金坼小苞香千載白衣酒一生青女霜春叢莫輕薄彼此有行藏臺城水國春長在臺城夜未寒麗華承寵渥江令捧杯盤宴罷明堂爛詩成寶炬殘兵來吾有計金井玉構欄舊遊良時不復再漸老更難言逺水猶經眼髙樓似斷魂依依宋玉宅歷歷長卿村今日空江畔相於只酒樽寄虔州薛大夫祝融峯下别三載夢魂勞地轉南康重官兼亞相髙海鵬終負日神馬背眠槽會得窺成績幽窗染兔毫蘇小小墓魂兮擕里城由未有人耕好月當年事殘花觸處情向誰曽艷冶隨分得聲名應待吳王日蘭橈暗送迎寒食日早春城東青門欲曉天車馬巳喧闐禁柳踈風細墻花拆露鮮唯言誇麗景只是歎流年不得髙飛便回頭望帶鳶秋日懷賈隋進士邊寇日搔動故人音信稀長纓慚賈誼孤冢憶韓非曉匣魚腸冷春園鴨掌肥知君安未得聊且示忘機亂後逢友人滄海去未得倚舟聊問津生靈寇盜盡方鎮改更貧夢裏舊行處眼前新貴人從來事如此君莫獨沾巾殘花巳歎良時晚仍悲别酒催暖芳隨日薄輕片逐風回黛斂愁歌扇粧殘泣鏡臺繁隂莫矜衒終是共塵埃秋日冨春江行逺岸平如翦澄江靜似鋪紫鱗仙客馭金顆李衡奴冷疊羣山闊清函萬象殊嚴陵亦髙見歸卧是良圖寄侯博士規諫揚雄賦邅回賈誼官久貧還往少孤立轉遷難清鏡流年急髙槐旅舍寒侏儒亦何有飽食向長安送沈光侍御赴職閩中未至應居全家出帝鄉禮優逢苑雪官重帶臺霜夜浦吳潮亂春灘建水狂延平有風雨從此是騰驤寄袁皓侍郎東堂失路歧榮辱事堪悲我寢牛衣弊君居象角危風塵慚上品才業愧明時千里芙蓉幕何由話所思寄金吾李蓀常侍西班掌禁兵蘭錡最分明曉色嚴天仗春寒避火城安危雖巳任韜略即嘉聲請問何功德壷關寇始平商驛與于韞玉話別南朝徐庾流洛下憶同遊酒採間坊菊山登逺寺樓相思勞寄夢偶别巳經秋還被青青桂催君不自由封禪寺居盛禮何由覩嘉名偶寄居周南太史淚蠻徼長卿書砌竹搖風直庭花泣露踈誰能賦秋興千里隔吾廬錢志士不敢道貯之成禍胎小人無事藝假爾作梯媒解釋愁腸結能分睡眼開朱門狼虎性一半逐君回投寄韋右丞赤壁徵文聘中臺拜郤詵官資參令僕曹署轄星辰幞被從誰起持綱自此新舉朝明典教封納詔書頻禁樹曽摛藻臺烏舊避塵便應酬倚注何處話窮鱗紅葉不奈荒城畔那堪晚照中野情霜裛緑山冷雨催紅遊子霸陵道美人長信宫等間居歲暮搖落意無窮期徐道者不至遼鶴虛空語冥鴻未易親偶然來即是必擬見無因霜霰窮冬冷杯盤旅舍貧只應薊子訓醉後懶分身歲除夜官曆行將盡村醪強自傾猒寒思暖律畏老惜殘更歲月巳如此寇戎猶未平兒童不諳事歌次待天明雪盡道豐年瑞豐年事若何長安有貧者為瑞不冝多旅夢旅夢思遷次窮愁有歎嗟子鵝京口逺粳米會稽賖漏澀才成滴燈寒不作花出門聊一望蟾桂向人斜秋寄張坤庭樹巳黃落閉門俱寂寥未知棲托處空羡聖明朝酒醒鄉心闊雲晴客思遙吾徒自多感顔子只簞瓢傷華髮舊國迢迢逺清秋種種新巳衰曽軫慮初見忽沾巾日薄梳兼懶根危鑷恐頻青銅不自見只擬老他人九江早秋雨過晚涼生樓中枕簟清海風吹亂木巖磬落孤城百歲幾多日四蹄無限程西鄰莫髙唱俱是别離情初秋寄友人九華曽屏迹罹亂與心違是處堪終老新秋又未歸病中芳草歇愁裏白雲飛樵侣兼同志音書近亦稀秋居有寄端居湖岸東生計有無中魘處千般鬼寒時百種風性靈從道拙心事奈成空多謝金臺客何當一笑同雪霽南山雪乍晴寒氣轉崢嶸鎖却間門出隨他駿馬行一竿如有計五鼎豈須烹秋見天街草青青又欲生堠子終日路歧旁前程亦可量未能慚面黑只是恨頭方雅旨逾千里髙文近兩行君知不識字第一莫形相初夏寄顧紹宗江上偶分袂四回寒暑更青山無路入白髮滿頭生郢浦鴈尋過鏡湖蟬又鳴憐君未歸日杯酒若為情寄第五尊師苕溪煙月久因循野鶴衣裘獨繭綸只説泊船無定處不知攜手是何人朱黃㨂日囚尸鬼青白臨時注腦神欲訪先生問經訣丗間難得自由身寄西華黃錬師西華有路入中華依約山川認永嘉羽客昔時留篠簜故人今又種煙霞壇髙巳降三清鶴海近應通八月槎盛事兩般君揔得老萊衣服戴顒家所思西上青雲未有期東浮滄海去何遲酒闌夢覺不稱意花落日明空所思長恐病侵多事日可堪忙過少年時鬪雞走犬五陵道惆悵輸他輕薄兒甲乙集卷第五
