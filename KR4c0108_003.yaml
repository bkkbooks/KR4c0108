front:
  text: 甲乙集卷第三
  hash: sha256:0bd275ca4685f0de69d36ff908e0b5657f258f6e01f7aecc0e6a0ca0486ef097
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0108_SBCK_003-1a}
body:
  text: 餘杭羅隱昭諫詩錢尚父生日大昴分光降斗牛興唐宗社作諸侯伊夔事業扶千載韓白機謀冠九州貴盛上持龍節鉞延長應續鶴春秋錦衣玉食將何報更俟莊椿一舉頭寄前户部陸郎中出馴桑雉入朝簮蕭灑清名映士林近日篇章欺白雪早年詞賦得黃金桂堂縱道探龍頷蘭省何曽駐鶴心罹亂事多人不㑹酒濃花暖且間吟登瓦棺寺閣下盤雲跡上雲浮偶逐僧行步步愁暫憩巳知須用意漸來爭忍不回頭煙鐘樹老重江晚林鐸風輕四境秋懶指臺城更東望鵲飛龍鬪盡荒丘九華山費徴君所居草堂何處試徘徊見說遺蹤向此開蟾樹自歸三徑後鶴書曽降九天來白雲事跡依前在青瑣光隂竟不回盡夕為君思曩日野泉嗚咽路莓苔途中寄懷不知何處是前程合掌騰騰信馬行兩鬚巳衰時未與數峯雖在病相嬰塵埃鞏洛虛光景詩酒江湖漫姓名試哭軍門看誰問舊來還似禰先生京口見李侍郎傞傞江柳欲矜春鐵瓮城邊見故人屈指不堪言甲子披風常記是庚申别來且喜身俱健亂後休悲業盡貧還有杖頭沽酒物待尋山寺話逡巡秋日酬張特玄病寄南徐兩度秋故人依約亦揚州偶因鴈足思間事擬棹孤舟訪舊遊風急幾聞江上笛月髙誰共酒家樓平生意氣消磨盡甘露軒前看水流登髙詠菊盡籬畔霜前偶得存苦教遲晚避蘭蓀能銷造化幾多力不受陽和一點恩生處豈容依玉砌要時還許上金樽陶公沒後無知己露滴幽叢見淚痕登夏州城樓寒聲獵獵戍旗風獨倚危欄悵望中萬里山川唐土地千年魂魄晉英雄離心不忍聽邊馬往事應須問塞鴻好脫儒冠從校尉一枝長㦸六鈞弓水邊偶題野水無情去不回水邊花好為誰開只知事逐眼前去不覺老從頭上來窮似丘軻休歎息達如周召亦塵埃思量此理何人㑹家邑先生最有才故洛陽公鎮大梁時隱得遊門下今之經歷事往人非聊杼所懷以傷以謝孤舟欲泊思何窮曽憶西來值雪中朱履少年初滿座白衣遊子也從公狂拋賦筆琉璃冷醉倚歌筵玳瑁紅今日斯文向誰說淚碑棠樹兩成空杜陵秋思南望商於北帝都兩堪栖托兩無圖只聞斥逐張公子不覺悲同楚大夫巖畔早涼生紫桂井邊踈影落髙梧一杯渌酒他年憶瀝向清波寄五湖隱嘗在江陵忝故中令白公叨蒙知遇今復重過渚宫感事悲身遂成長句往歲鄼侯鎮渚宫曽將清律暖孤蓬才憐曼倩三冬後藝許由基一箭中言重不能輕薄命地寒終是立春風鳯凰也合台星拆回首𡵨山憶至公夜泊毗陵無錫縣有寄草蟲幽咽樹初團獨繫孤舟夜巳䦨濁浪勢奔吳宛急踈鐘聲出慧山寒愁催鬢髮雕何易貧戀家鄉别漸難他日親朋應大笑始知書劒是無端桃花暖觸衣襟漠漠香間梅遮柳不勝芳數枝艷拂文君酒半里紅欹宋玉墻盡日無人疑悵望有時經雨乍凄涼舊山山下還如此回首東風一斷腸籌筆驛拋擲南鄉為主憂北征東討盡良籌時來天地皆同力運去英雄不自由千里山河輕孺子兩朝冠劒恨譙周唯餘巖下多情水猶解年年傍驛流重過隨州故兵部李侍郎恩知因杼長句周髙論百牙琴間夜思量淚滿襟四海共誰言近事九原從此負初心鷗翻漢浦風波急鴈下鄖溪霧雨深慚愧蒼生還有意解歌𥜗袴至如今商驛樓東望有感山川去接漢江東曽伴隋侯醉此中歌繞夜梁珠宛轉舞嬌春席雪朦朧棠遺善政隂猶在薤送哀聲事巳空惆悵知音竟難得兩行清淚白楊風寄南城韋逸人杜甫詩中韋曲花至今無賴尚家家美人晚折露沾袖公子醉時香滿車萬里丹青傳不得二年風雨恨無涯羡他南澗髙眠客春去春來任物華梅花吳王醉處十餘里照夜拂衣今正煩經雨不隨山鳥散倚風疑共路人言愁憐粉艷飄歌席靜愛寒香撲酒樽欲寄所思無好信為君惆悵又黃昏淮南髙駢所造迎仙樓鸞音鶴信杳難回鳯駕龍車早晚來仙境是誰知處所人間空自造樓臺雲侵朱檻應難到蟲網間窗永不開子細思量成底事露凝風擺作塵埃和禪月大師見贈髙僧惠我七言詩頓豁塵心展白眉秀似谷中花媚日清如潭底月圎時應觀法界蓮千葉肯折人間桂一枝漂蕩秦吳十餘載因循猶恨識師遲謁文宣王廟晚來乘興謁先師松柏淒淒人不知九仞蕭墻堆瓦礫三間茅殿走狐狸雨霖狀似悲麟泣露滴還同歎鳯悲儻使小儒名粗立豈教吾道受栖遲代文宣王答三教之中儒最尊止戈為武武尊文吾仐尚自披蓑笠你等何須讀典隤釋氏寶樓侵碧漢道家宫殿拂青雲若教顔閔英靈在終不羞他李老君重送朗州張貟外朱輪此去正春風且駐青門聽斷蓬一榻早年容孺子雙旌今日别文翁誠知汲善心常在爭奈干時跡轉窮酬德酬恩兩無路謾勞惆悵鳯城東廣陵秋夜讀進士常修三篇因題入蜀歸吳三首詩藏於篋笥重於師劒關夜讀相如聽瓜步秋吟煬帝悲景物也知輸健筆時情誰不許髙枝明年二月春風裏江島間人尉所思逼試投所知桃在仙翁舊苑傍暖煙晴靄撲人香十年北地頻偷眼二月春風最斷腸曽恨夢中無好事也知囊裏有仙方尋思仙骨終難得始與回頭問玉皇漢江上作漢江波浪渌於苔每到江邊病眼開半雨半風終日恨無名無跡幾時回雲生岸谷秋隂合樹接帆檣晚思來對此空慙聖明代忍教纓上有塵埃秋夜寄進士顧榮秋河耿耿夜沉沉往事三更盡到心多病謾勞窺聖代薄才終是費知音家山夢後帆千尺塵土搔來髮一簮空羡良朋盡髙價可憐東箭與南金寄渭北徐從事暖雲慵墮柳垂條驄馬徐郎過渭橋官秩舊參荀袐監樽罍今伴霍嫖姚科隨鵠箭頻曽中禮向侯弓以重招莫恨東風促行李不多時節却歸朝徐寇南逼感事獻江南知己次韻酒䦨離思浩無窮西望惟揚憶公萬里漂零身未了一家知奬意曽同雲撗晉國塵應暗路轉吳江信不通今日便成盧子諒滿襟珠淚墮霜風寄三衢孫貟外小敷文伯見何時南望三衢渴復飢天子未能崇典誥諸生徒欲戀旌旗風髙緑野苗千頃露冷平樓酒滿巵盡是數旬倍奉處使君爭肯不相思淮南送盧端公歸臺鸞凰勢逸九霄寬北去南來任羽翰朱紱兩驂王儉府繡衣三領杜林官道從國曽匡濟才向牢盆始重難應笑張綱謾生事埋輪不得在長安煬帝陵入郭登橋出郭船紅樓日日柳年年君王忍把平陳業只换雷塘數畒田馬嵬坡佛屋前頭野草春貴妃輕骨此為塵從來絶色知難得不破中原未是人柳灞岸晴來送别頻相偎相倚不勝春自家飛絮猶無定爭解垂絲絆路人隋堤柳夾岸依依千里遙路人回首認隋朝春風未借宣華意猶費工夫長緑條孟浩然墓數步荒榛接舊蹊寒江漠漠草萋萋鹿門黃土無多少恰到書生冢便低秦紀長䇿東鞭極海隅黿鼉奔走鬼神趨憐君未到沙丘日肯信人間有死無仙掌掌前流水駐無掌下軒車日日新謾向山頭髙舉手何曽招得路行人甲乙集卷第三
